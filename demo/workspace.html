<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作区管理 - CodeGraph</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: '#6366f1', secondary: '#8b5cf6', accent: '#06b6d4' } } }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen text-slate-800 dark:text-slate-200">
  <!-- 顶栏 -->
  <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
          <i class="fa-solid fa-folder-tree text-white"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold">工作区 <span class="gradient-text">Workspace</span></h1>
          <p class="text-xs text-slate-500 dark:text-slate-400">基线按工作区隔离 · 选择或新建工作区进入编辑</p>
        </div>
      </div>
      <a href="index.html" class="text-sm text-slate-500 dark:text-slate-400 hover:text-primary transition">
        <i class="fa-solid fa-arrow-left mr-1"></i>返回 Demo
      </a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <!-- 新建工作区 -->
    <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-5 shadow-sm mb-6">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-plus text-primary"></i>
        <h2 class="text-sm font-semibold">新建工作区</h2>
      </div>
      <div class="mt-3 flex gap-2">
        <input id="new-ws-name" type="text" placeholder="工作区名称（如：化学反应图集 / 系统架构设计）"
          class="flex-1 px-3 py-2 text-sm border border-slate-300 dark:border-slate-700 dark:bg-slate-800 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
        <button id="create-ws" class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:opacity-90 transition">
          <i class="fa-solid fa-plus mr-1"></i>创建
        </button>
      </div>
    </div>

    <!-- 工作区列表 -->
    <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
      <div class="px-5 py-3 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
        <h2 class="text-sm font-semibold"><i class="fa-solid fa-list mr-1 text-primary"></i>所有工作区</h2>
        <span id="ws-count" class="text-xs text-slate-400"></span>
      </div>
      <div id="ws-list" class="divide-y divide-slate-100 dark:divide-slate-800"></div>
    </div>

    <!-- 说明 -->
    <div class="mt-6 bg-indigo-50 dark:bg-indigo-950/30 border border-indigo-200 dark:border-indigo-800 rounded-xl p-4 text-xs text-indigo-700 dark:text-indigo-300">
      <p class="font-semibold mb-1"><i class="fa-solid fa-circle-info mr-1"></i>工作区说明</p>
      <ul class="list-disc list-inside space-y-1 opacity-90">
        <li>每个工作区有独立的视觉回归测试基线集合</li>
        <li>切换工作区后，回归测试面板仅显示该工作区的基线</li>
        <li>默认工作区不可删除，可重命名</li>
        <li>删除工作区会一并清除其所有基线</li>
      </ul>
    </div>
  </main>

  <script type="module">
    import { listWorkspaces, createWorkspace, renameWorkspace, deleteWorkspace, setCurrentWorkspace, getCurrentWorkspace, getCurrentWorkspaceName, listBaselines } from '../src/regression.js';
    import { prompt, alert, confirm } from '../src/ui.js';

    const $ = id => document.getElementById(id);

    function renderWSList() {
      const list = listWorkspaces();
      const current = getCurrentWorkspace();
      $('ws-count').textContent = `共 ${list.length} 个`;
      const el = $('ws-list');
      if (!list.length) {
        el.innerHTML = '<div class="p-5 text-xs text-slate-500 text-center">暂无工作区，请在上方创建</div>';
        return;
      }
      el.innerHTML = list.map(ws => {
        const baselineCount = (() => {
          // 临时切换工作区读取基线数（不修改全局状态）
          // 直接用 listBaselines 但它会读当前工作区，所以先记下当前再切回
          const cur = getCurrentWorkspace();
          setCurrentWorkspace(ws.id);
          const n = listBaselines().length;
          setCurrentWorkspace(cur);
          return n;
        })();
        const isCurrent = ws.id === current;
        const isDefault = ws.id === 'default';
        return `<div class="px-5 py-4 flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-800/50 transition ${isCurrent ? 'bg-indigo-50/50 dark:bg-indigo-950/20' : ''}">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg ${isCurrent ? 'bg-primary text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500'} flex items-center justify-center">
              <i class="fa-solid ${isDefault ? 'fa-house' : 'fa-folder'}"></i>
            </div>
            <div>
              <div class="flex items-center gap-2">
                <span class="text-sm font-medium">${ws.name}</span>
                ${isCurrent ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-primary text-white">当前</span>' : ''}
                ${isDefault ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300">默认</span>' : ''}
              </div>
              <div class="text-xs text-slate-400 mt-0.5">${baselineCount} 个基线 · 创建于 ${new Date(ws.createdAt).toLocaleString('zh-CN')}</div>
            </div>
          </div>
          <div class="flex items-center gap-1">
            ${isCurrent
              ? `<button class="enter-btn text-xs px-3 py-1.5 rounded bg-primary text-white opacity-70 cursor-default" disabled><i class="fa-solid fa-check mr-1"></i>已进入</button>`
              : `<button class="enter-btn text-xs px-3 py-1.5 rounded bg-primary text-white hover:opacity-90 transition" data-id="${ws.id}"><i class="fa-solid fa-arrow-right mr-1"></i>进入</button>`
            }
            <button class="rename-btn text-xs px-2.5 py-1.5 rounded border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition" data-id="${ws.id}" data-name="${ws.name.replace(/"/g, '&quot;')}" title="重命名">
              <i class="fa-solid fa-pen"></i>
            </button>
            ${isDefault
              ? '<button class="text-xs px-2.5 py-1.5 rounded border border-slate-200 dark:border-slate-800 text-slate-300 dark:text-slate-700 cursor-not-allowed" disabled title="默认工作区不可删除"><i class="fa-solid fa-trash"></i></button>'
              : `<button class="delete-btn text-xs px-2.5 py-1.5 rounded border border-red-300 dark:border-red-800 text-red-600 hover:bg-red-50 dark:hover:bg-red-950/30 transition" data-id="${ws.id}" data-name="${ws.name.replace(/"/g, '&quot;')}" title="删除"><i class="fa-solid fa-trash"></i></button>`
            }
          </div>
        </div>`;
      }).join('');

      // 绑定事件
      el.querySelectorAll('.enter-btn:not([disabled])').forEach(btn => {
        btn.addEventListener('click', () => {
          setCurrentWorkspace(btn.dataset.id);
          window.location.href = 'index.html';
        });
      });
      el.querySelectorAll('.rename-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const newName = await prompt('重命名工作区：', btn.dataset.name);
          if (newName === null || !newName.trim() || newName.trim() === btn.dataset.name) return;
          if (renameWorkspace(btn.dataset.id, newName.trim())) {
            renderWSList();
          } else {
            await alert('重命名失败：名称已存在');
          }
        });
      });
      el.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const ok = await confirm(`确认删除工作区「${btn.dataset.name}」？`, '该操作会一并清除其所有基线，且不可恢复。');
          if (!ok) return;
          if (deleteWorkspace(btn.dataset.id)) {
            renderWSList();
          } else {
            await alert('删除失败');
          }
        });
      });
    }

    // 创建工作区
    $('create-ws').addEventListener('click', async () => {
      const name = $('new-ws-name').value.trim();
      if (!name) { await alert('请输入工作区名称'); return; }
      const ws = createWorkspace(name);
      if (!ws) { await alert('创建失败：名称已存在'); return; }
      $('new-ws-name').value = '';
      renderWSList();
    });
    $('new-ws-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') $('create-ws').click();
    });

    renderWSList();
  </script>
</body>
</html>
